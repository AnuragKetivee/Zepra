<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Browser / OS SVG Icon Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        :root {
            --primary: #667eea;
            --surface: #ffffff;
            --background: #f8f9fa;
            --border: #e0e0e0;
            --text: #1a1a1a;
        }

        [data-theme="dark"] {
            --surface: #2d2d2d;
            --background: #1a1a1a;
            --border: #404040;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
        }

        header {
            padding: 20px;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 12px;
            padding: 20px;
            flex-wrap: wrap;
        }

        input,
        select,
        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
        }

        button {
            cursor: pointer;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 20px;
        }

        .icon-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            transition: 0.2s;
        }

        .icon-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .icon-preview svg {
            width: 48px;
            height: 48px;
        }

        .icon-name {
            font-size: 11px;
            margin: 10px 0;
            word-break: break-all;
            opacity: 0.8;
        }

        .icon-actions {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 14px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content pre {
            background: var(--background);
            padding: 10px;
            overflow: auto;
            font-size: 11px;
        }

        .theme-toggle {
            display: flex;
            gap: 6px;
        }
    </style>
</head>

<body data-theme="light">

    <header>
        <h1>Browser / OS SVG Icon Library</h1>
    </header>

    <div class="controls">
        <input id="search" placeholder="Search icons..." />
        <select id="category"></select>

        <button onclick="toggleTheme()">Toggle Theme</button>
        <button onclick="downloadAll()">Download All</button>
    </div>

    <div id="grid" class="icon-grid"></div>

    <!-- Modal -->
    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-title"></h3>
            <div id="modal-preview"></div>
            <pre id="modal-code"></pre>
            <button onclick="copyModal()">Copy SVG</button>
            <button onclick="downloadModal()">Download SVG</button>
        </div>
    </div>

        const search = document.getElementById("search");
        const category = document.getElementById("category");

        category.innerHTML = `<option value="all">All</option>`;

        render();

        /* ---------------- FUNCTIONS ---------------- */

        function render() {
            grid.innerHTML = "";
            const term = search.value.toLowerCase();

            Object.entries(icons).forEach(([name, svg]) => {
                if (!name.includes(term)) return;

                const card = document.createElement("div");
                card.className = "icon-card";
                card.innerHTML = `
      <div class="icon-preview">${svg}</div>
      <div class="icon-name">${name}</div>
      <div class="icon-actions">
        <button onclick="openModal('${name}')">View</button>
        <button onclick="copy('${name}')">Copy</button>
        <button onclick="download('${name}')">⬇</button>
      </div>
    `;
                grid.appendChild(card);
            });
        }

        search.oninput = render;

        function openModal(name) {
            selected = name;
            document.getElementById("modal").classList.add("active");
            document.getElementById("modal-title").textContent = name;
            document.getElementById("modal-preview").innerHTML = icons[name];
            document.getElementById("modal-code").textContent = icons[name];
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("active");
        }

        function copy(name) {
            navigator.clipboard.writeText(icons[name]);
        }

        function copyModal() {
            navigator.clipboard.writeText(icons[selected]);
        }

        function download(name) {
            const blob = new Blob([icons[name]], { type: "image/svg+xml" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = name + ".svg";
            a.click();
        }

        function downloadModal() {
            download(selected);
        }

        function downloadAll() {
            Object.keys(icons).forEach((k, i) =>
                setTimeout(() => download(k), i * 80)
            );
        }

        function toggleTheme() {
            const body = document.body;
            body.dataset.theme = body.dataset.theme === "dark" ? "light" : "dark";
        }
    </script>

</body>

</html>
