<!DOCTYPE html>
<html lang="en"><head><title>Canvas 2D Stress Test</title></head>
<body style="background:#111; color:white; font-family:monospace;">
  <h2>Canvas nxrender Stress & Paint Invalidation</h2>
  <canvas id="c" width="800" height="600" style="border:1px solid #444;"></canvas>
<script>
  const ctx = document.getElementById('c').getContext('2d');
  let frames = 0; const start = performance.now();
  function draw() {
    ctx.clearRect(0, 0, 800, 600);
    for(let i=0; i<2500; i++) {
      ctx.fillStyle = `rgba(${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, 0.5)`;
      ctx.fillRect(Math.random()*800, Math.random()*600, 15, 15);
    }
    frames++;
    if(performance.now() - start > 7000) {
      const out = `ZEPRA CANVAS NXRENDER METRICS\n---------------------\nTotal Frames: ${frames}\nAvg FPS: ${(frames/7).toFixed(2)}\nDuration: 7.00s`;
      console.log(out);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([out], {type:'text/plain'}));
      a.download = 'canvas_result.txt'; 
      a.click();
      document.body.innerHTML += `<pre>${out}</pre><br><b>Saved to canvas_result.txt</b>`;
    } else requestAnimationFrame(draw);
  }
  draw();
</script>
</body></html>
