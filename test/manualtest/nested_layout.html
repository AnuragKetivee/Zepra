<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nested Layout Test</title>
<style>
  body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #222; color: #fff; }
  .flex-container { display: flex; flex: 1; padding: 2px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.05); border-radius: 2px; }
  .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 2px; border: 1px dashed rgba(255,100,100,0.2); }
  .item { flex: 1; min-height: 10px; min-width: 10px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  let html = '';
  // Generate 12 levels deep of alternating flex and grid
  function generateNodes(depth) {
    if (depth === 0) return '<div class="item">End</div>';
    
    const isGrid = depth % 2 === 0;
    const tag = isGrid ? 'grid-container' : 'flex-container';
    
    return `
      <div class="${tag}">
        ${generateNodes(depth - 1)}
        ${generateNodes(depth - 1)}
      </div>
    `;
  }

  document.getElementById('root').innerHTML = generateNodes(12);
  console.log("Total Nodes: " + Math.pow(2, 13));
</script>
</body>
</html>
